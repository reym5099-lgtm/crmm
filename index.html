<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales CRM — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #06060c;
  --bg-card: #0d0d16;
  --bg-elevated: #12121f;
  --bg-hover: #181828;
  --border: #1c1c32;
  --border-active: #2a2a4a;
  --text-primary: #eef0f6;
  --text-secondary: #8b8fa8;
  --text-muted: #555770;
  --accent: #4f6ef7;
  --accent-glow: #4f6ef722;
  --green: #2dd4a0;
  --red: #f05c6e;
  --amber: #f0a030;
  --cyan: #38bdf8;
  --violet: #a78bfa;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}

body {
  font-family: var(--font);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

/* Layout */
.app { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { margin-bottom: 28px; }
.header h1 {
  font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text-primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* Setup Banner */
.setup-banner {
  background: var(--accent-glow);
  border: 1px solid var(--accent)44;
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
  text-align: center;
}
.setup-banner input {
  background: var(--bg-deep);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  width: 100%;
  max-width: 500px;
  margin: 10px 0;
}
.setup-banner .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Stats */
.stats-row {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 6px; margin-bottom: 20px;
  scrollbar-width: none;
}
.stats-row::-webkit-scrollbar { display: none; }
.stat-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s ease;
  user-select: none;
}
.stat-chip:hover { border-color: var(--border-active); background: var(--bg-elevated); }
.stat-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.stat-chip .count { font-family: var(--mono); font-weight: 700; font-size: 14px; }

/* Controls */
.controls {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.controls input, .controls select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.controls input:focus, .controls select:focus { border-color: var(--accent); }
.controls input { flex: 1; min-width: 180px; }

/* Buttons */
.btn {
  border: none;
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-green { background: var(--green); color: #000; }
.btn-green:hover { filter: brightness(1.1); }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.btn-ghost:hover { border-color: var(--border-active); color: var(--text-primary); }
.btn-danger { background: var(--red)22; color: var(--red); border: 1px solid var(--red)44; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* Contact List */
.contact-list { display: flex; flex-direction: column; gap: 4px; }
.contact-row {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 12px;
}
.contact-row:hover {
  background: var(--bg-hover);
  border-color: var(--border-active);
  transform: translateX(2px);
}
.contact-row.overdue { border-left: 3px solid var(--red); }
.stage-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.contact-info { flex: 1; min-width: 0; }
.contact-name {
  font-weight: 600; font-size: 14px; color: var(--text-primary);
  display: flex; align-items: center; gap: 6px;
}
.contact-meta {
  font-size: 12px; color: var(--text-muted); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.contact-right { text-align: right; flex-shrink: 0; }
.contact-stage { font-size: 11px; font-weight: 600; }
.contact-notes-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Result count */
.result-count { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }

/* Detail View */
.detail-view { animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.detail-header {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
}
.detail-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.detail-contacts { font-size: 13px; color: var(--text-secondary); display: flex; gap: 16px; flex-wrap: wrap; }
.detail-contacts a { color: var(--accent); text-decoration: none; }
.detail-contacts a:hover { text-decoration: underline; }
.detail-lead-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.detail-badges { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.badge {
  padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
  border: 1px solid transparent;
}

/* Panels */
.panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
@media (max-width: 700px) { .panel-grid { grid-template-columns: 1fr; } }
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.panel-title {
  font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 10px;
}
.option-btn {
  display: block; width: 100%;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  text-align: left;
  transition: all 0.1s;
  margin-bottom: 2px;
}
.option-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.option-btn.active { border-color: currentColor; }

/* Notes */
.notes-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.note-entry {
  border-left: 3px solid var(--accent)44;
  padding-left: 12px;
  margin-bottom: 14px;
}
.note-date { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.note-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
textarea {
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: var(--font);
  min-height: 100px;
  resize: vertical;
  outline: none;
}
textarea:focus { border-color: var(--accent); }

/* Add Contact Form */
.add-form {
  background: var(--bg-card);
  border: 1px solid var(--accent)44;
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 16px;
  animation: slideIn 0.15s ease;
}
.add-form .form-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
@media (max-width: 600px) { .add-form .form-row { grid-template-columns: 1fr; } }
.add-form input {
  background: var(--bg-deep);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 10px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
}
.add-form .form-actions { display: flex; gap: 8px; margin-top: 10px; }

/* Date input */
input[type="date"] {
  background: var(--bg-deep);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 8px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  margin-top: 4px;
  width: 100%;
}
select {
  background: var(--bg-deep);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 8px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  margin-top: 4px;
  width: 100%;
}
label { font-size: 12px; color: var(--text-muted); }

/* Loading */
.loading {
  text-align: center; padding: 40px;
  color: var(--text-muted); font-size: 14px;
}
.loading .spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-active);
  color: var(--text-primary);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 9999;
  animation: toastIn 0.3s ease;
  box-shadow: 0 8px 30px #00000060;
}
.toast.success { border-color: var(--green)66; }
.toast.error { border-color: var(--red)66; }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ============================================================
// CONFIG & STATE
// ============================================================

const PIPELINE_STAGES = [
  { id: "new", label: "Neu / Unbearbeitet", color: "#64748b", icon: "◯" },
  { id: "contacted", label: "Kontaktiert", color: "#4f6ef7", icon: "◉" },
  { id: "qualified", label: "Qualifiziert", color: "#a78bfa", icon: "◈" },
  { id: "link_sent", label: "Link gesendet", color: "#f0a030", icon: "▸" },
  { id: "funnel_active", label: "Im Funnel aktiv", color: "#38bdf8", icon: "◆" },
  { id: "follow_up", label: "Follow-Up nötig", color: "#f05c6e", icon: "⚡" },
  { id: "closed_won", label: "Abgeschlossen ✓", color: "#2dd4a0", icon: "✓" },
  { id: "closed_lost", label: "Kein Interesse", color: "#94a3b8", icon: "✗" },
];

const PRIORITY_LEVELS = [
  { id: "hot", label: "🔥 Hot", color: "#f05c6e" },
  { id: "warm", label: "🌡️ Warm", color: "#f0a030" },
  { id: "cold", label: "❄️ Cold", color: "#64748b" },
];

const NEXT_ACTIONS = [
  "Anrufen", "WhatsApp senden", "E-Mail senden", "Link zusenden",
  "Follow-Up Termin", "Einwand klären", "Abschluss machen", "Warten auf Rückmeldung"
];

const FUNNEL_STATUSES = [
  { value: "", label: "— Nicht im Funnel —" },
  { value: "entered", label: "Eingetreten" },
  { value: "watching", label: "Schaut Video" },
  { value: "engaged", label: "Interagiert" },
  { value: "booking", label: "Termin gebucht" },
  { value: "completed", label: "Durchlaufen" },
  { value: "dropped", label: "Abgesprungen" },
];

let state = {
  apiUrl: localStorage.getItem("crm_api_url") || "",
  contacts: [],
  loading: false,
  view: "list",
  selectedId: null,
  search: "",
  filterStage: "all",
  filterPriority: "all",
  sortBy: "name",
  showAddForm: false,
  showNoteForm: false,
  noteText: "",
  toastMsg: "",
  toastType: "",
};

// ============================================================
// API (Google Apps Script CORS-kompatibel)
// Verwendet GET für Lesen, GET mit Payload-Chunks für Schreiben
// ============================================================

async function apiGet(action = "getAll") {
  const url = `${state.apiUrl}?action=${action}`;
  const res = await fetch(url, { redirect: "follow" });
  return await res.json();
}

async function apiPost(body) {
  // Daten als URL-Parameter senden (für kleine Payloads)
  const encoded = encodeURIComponent(JSON.stringify(body));
  const url = `${state.apiUrl}?action=post&payload=${encoded}`;
  const res = await fetch(url, { redirect: "follow" });
  return await res.json();
}

async function loadContacts() {
  if (!state.apiUrl) return;
  state.loading = true;
  render();
  try {
    const result = await apiGet("getAll");
    if (result.success) {
      state.contacts = result.data.map(c => ({
        ...c,
        notes: Array.isArray(c.notes) ? c.notes : []
      }));
      showToast("Kontakte geladen (" + state.contacts.length + ")", "success");
    } else {
      showToast("Fehler: " + result.error, "error");
    }
  } catch (e) {
    showToast("Verbindungsfehler: " + e.message, "error");
  }
  state.loading = false;
  render();
}

async function saveContact(contact) {
  try {
    const result = await apiPost({ action: "update", data: contact });
    if (result.success) {
      showToast("Gespeichert ✓", "success");
    } else {
      showToast("Fehler: " + result.error, "error");
    }
  } catch (e) {
    showToast("Speichern fehlgeschlagen", "error");
  }
}

async function createContact(data) {
  try {
    data.id = genId();
    data.leadDate = new Date().toISOString().split("T")[0];
    data.stage = "new";
    data.priority = "cold";
    data.notes = [];
    const result = await apiPost({ action: "create", data });
    if (result.success) {
      state.contacts.unshift(data);
      showToast("Kontakt angelegt ✓", "success");
    } else {
      showToast("Fehler: " + result.error, "error");
    }
  } catch (e) {
    showToast("Anlegen fehlgeschlagen", "error");
  }
  render();
}

// Import in kleinen Batches (je 5 Kontakte pro Request)
async function importInitialData() {
  const BATCH_SIZE = 5;
  const total = INITIAL_CONTACTS.length;
  let imported = 0;
  let errors = 0;
  
  showToast("Importiere " + total + " Kontakte...", "success");
  
  for (let i = 0; i < total; i += BATCH_SIZE) {
    const batch = INITIAL_CONTACTS.slice(i, i + BATCH_SIZE);
    try {
      const result = await apiPost({ action: "bulkCreate", data: batch });
      if (result.success) {
        imported += batch.length;
        showToast("Importiert: " + imported + " / " + total, "success");
      } else {
        errors += batch.length;
      }
    } catch (e) {
      errors += batch.length;
    }
    // Kurze Pause damit Google nicht drosselt
    await new Promise(r => setTimeout(r, 300));
  }
  
  if (errors > 0) {
    showToast("Import fertig. " + imported + " OK, " + errors + " Fehler.", "error");
  } else {
    showToast("Alle " + imported + " Kontakte importiert! ✓", "success");
  }
  
  await loadContacts();
}

// ============================================================
// HELPERS
// ============================================================

function genId() { return Math.random().toString(36).substr(2, 8); }

function formatDate(d) {
  if (!d) return "";
  const parts = String(d).split("-");
  if (parts.length !== 3) return d;
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function stageInfo(id) {
  return PIPELINE_STAGES.find(s => s.id === id) || PIPELINE_STAGES[0];
}

function getSelected() {
  return state.contacts.find(c => c.id === state.selectedId);
}

function updateSelected(updates) {
  const idx = state.contacts.findIndex(c => c.id === state.selectedId);
  if (idx === -1) return;
  Object.assign(state.contacts[idx], updates);
  saveContact(state.contacts[idx]);
  render();
}

function showToast(msg, type) {
  state.toastMsg = msg;
  state.toastType = type;
  render();
  setTimeout(() => { state.toastMsg = ""; render(); }, 3000);
}

function getFiltered() {
  let list = [...state.contacts];
  if (state.search) {
    const s = state.search.toLowerCase();
    list = list.filter(c =>
      (c.name || "").toLowerCase().includes(s) ||
      (c.email || "").toLowerCase().includes(s) ||
      (c.phone || "").includes(s)
    );
  }
  if (state.filterStage !== "all") list = list.filter(c => c.stage === state.filterStage);
  if (state.filterPriority !== "all") list = list.filter(c => c.priority === state.filterPriority);

  const sortFns = {
    name: (a, b) => (a.name || "").localeCompare(b.name || ""),
    date: (a, b) => (b.leadDate || "").localeCompare(a.leadDate || ""),
    stage: (a, b) => PIPELINE_STAGES.findIndex(s => s.id === a.stage) - PIPELINE_STAGES.findIndex(s => s.id === b.stage),
    priority: (a, b) => { const o = { hot: 0, warm: 1, cold: 2 }; return (o[a.priority] || 2) - (o[b.priority] || 2); }
  };
  list.sort(sortFns[state.sortBy] || sortFns.name);
  return list;
}

function getStats() {
  const s = {};
  PIPELINE_STAGES.forEach(st => s[st.id] = state.contacts.filter(c => c.stage === st.id).length);
  s.total = state.contacts.length;
  return s;
}

// ============================================================
// RENDER
// ============================================================

function render() {
  const app = document.getElementById("app");

  if (!state.apiUrl) {
    app.innerHTML = renderSetup();
    return;
  }

  if (state.view === "detail" && state.selectedId) {
    app.innerHTML = renderDetail();
  } else {
    app.innerHTML = renderList();
  }

  if (state.toastMsg) {
    app.innerHTML += `<div class="toast ${state.toastType}">${esc(state.toastMsg)}</div>`;
  }
}

function renderSetup() {
  return `
    <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
      <div class="setup-banner" style="max-width:550px;width:100%;">
        <h2 style="font-size:20px;margin-bottom:6px;">Sales CRM Setup</h2>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
          Füge deine Google Apps Script URL ein, um das CRM mit deinem Sheet zu verbinden.
        </p>
        <input id="apiUrlInput" type="text" placeholder="https://script.google.com/macros/s/.../exec"
          value="${esc(state.apiUrl)}">
        <div class="hint">Die URL findest du unter: Apps Script → Bereitstellen → Web-App-URL</div>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">
          <button class="btn btn-primary" onclick="connectApi()">Verbinden</button>
        </div>
      </div>
    </div>
  `;
}

function renderList() {
  const filtered = getFiltered();
  const stats = getStats();

  let html = `
    <div class="header">
      <h1>Sales CRM</h1>
      <p>Link → Funnel Pipeline · ${state.contacts.length} Kontakte</p>
    </div>

    <div class="stats-row">
      ${PIPELINE_STAGES.map(s => `
        <div class="stat-chip ${state.filterStage === s.id ? 'active' : ''}"
          style="${state.filterStage === s.id ? `border-color:${s.color};color:${s.color};background:${s.color}18` : ''}"
          onclick="toggleFilter('${s.id}')">
          <span class="count">${stats[s.id] || 0}</span>
          <span>${s.label}</span>
        </div>
      `).join('')}
    </div>

    <div class="controls">
      <input type="text" placeholder="🔍 Name, E-Mail oder Telefon..."
        value="${esc(state.search)}" oninput="state.search=this.value;render()">
      <select onchange="state.filterPriority=this.value;render()">
        <option value="all">Alle Prioritäten</option>
        ${PRIORITY_LEVELS.map(p => `<option value="${p.id}" ${state.filterPriority === p.id ? 'selected' : ''}>${p.label}</option>`).join('')}
      </select>
      <select onchange="state.sortBy=this.value;render()">
        <option value="name" ${state.sortBy === 'name' ? 'selected' : ''}>A–Z</option>
        <option value="date" ${state.sortBy === 'date' ? 'selected' : ''}>Neueste zuerst</option>
        <option value="stage" ${state.sortBy === 'stage' ? 'selected' : ''}>Pipeline-Stufe</option>
        <option value="priority" ${state.sortBy === 'priority' ? 'selected' : ''}>Priorität</option>
      </select>
      <button class="btn btn-primary" onclick="state.showAddForm=!state.showAddForm;render()">+ Kontakt</button>
      <button class="btn btn-ghost btn-sm" onclick="loadContacts()">↻ Neu laden</button>
      <button class="btn btn-ghost btn-sm" onclick="disconnectApi()">⚙ API</button>
    </div>
  `;

  if (state.showAddForm) {
    html += `
      <div class="add-form">
        <div class="form-row">
          <input id="newName" placeholder="Name *">
          <input id="newEmail" placeholder="E-Mail">
          <input id="newPhone" placeholder="Telefon">
        </div>
        <div class="form-actions">
          <button class="btn btn-green btn-sm" onclick="addContact()">Anlegen</button>
          <button class="btn btn-ghost btn-sm" onclick="state.showAddForm=false;render()">Abbrechen</button>
        </div>
      </div>
    `;
  }

  if (state.contacts.length === 0 && !state.loading) {
    html += `
      <div class="empty-state">
        <div class="icon">📋</div>
        <div style="font-size:16px;margin-bottom:8px;">Noch keine Kontakte vorhanden</div>
        <button class="btn btn-primary" onclick="importInitialData()" style="margin-top:12px;">
          276 Kontakte importieren
        </button>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
          Importiert die Leads aus deiner Excel-Datei
        </div>
      </div>
    `;
  } else if (state.loading) {
    html += `<div class="loading"><div class="spinner"></div>Lade Kontakte...</div>`;
  } else {
    html += `<div class="result-count">${filtered.length} von ${state.contacts.length} Kontakten`;
    if (state.filterStage !== "all") html += ` · ${stageInfo(state.filterStage).label}`;
    html += `</div>`;

    html += `<div class="contact-list">`;
    for (const c of filtered) {
      const si = stageInfo(c.stage);
      const pri = PRIORITY_LEVELS.find(p => p.id === c.priority);
      const isOverdue = c.nextActionDate && new Date(c.nextActionDate) < new Date();
      html += `
        <div class="contact-row ${isOverdue ? 'overdue' : ''}" onclick="openContact('${c.id}')">
          <div class="stage-dot" style="color:${si.color};background:${si.color}"></div>
          <div class="contact-info">
            <div class="contact-name">
              ${esc(c.name)}
              ${pri ? `<span style="font-size:12px">${pri.label.split(' ')[0]}</span>` : ''}
              ${isOverdue ? `<span style="font-size:11px;color:var(--red);font-weight:600">⚠ Überfällig</span>` : ''}
            </div>
            <div class="contact-meta">
              ${esc(c.email || '')}
              ${c.nextAction ? ' · ' + esc(c.nextAction) : ''}
              ${c.nextActionDate ? ' · bis ' + formatDate(c.nextActionDate) : ''}
            </div>
          </div>
          <div class="contact-right">
            <div class="contact-stage" style="color:${si.color}">${si.label}</div>
            <div class="contact-notes-count">${(c.notes || []).length} Notizen</div>
          </div>
        </div>
      `;
    }
    html += `</div>`;

    if (filtered.length === 0) {
      html += `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <div>Keine Kontakte gefunden</div>
          <div style="font-size:13px;margin-top:4px">Filter oder Suchbegriff anpassen</div>
        </div>
      `;
    }
  }

  return html;
}

function renderDetail() {
  const c = getSelected();
  if (!c) { state.view = "list"; return renderList(); }

  const si = stageInfo(c.stage);
  const pri = PRIORITY_LEVELS.find(p => p.id === c.priority);

  let html = `<div class="detail-view">`;

  // Back button
  html += `<button class="btn btn-ghost btn-sm" onclick="state.view='list';state.selectedId=null;render()" style="margin-bottom:16px;">← Zurück zur Liste</button>`;

  // Header
  html += `
    <div class="detail-header">
      <div class="detail-name">${esc(c.name)}</div>
      <div class="detail-contacts">
        <span>📧 <a href="mailto:${esc(c.email)}">${esc(c.email || '—')}</a></span>
        <span>📱 <a href="tel:${esc(c.phone)}">${esc(c.phone || '—')}</a></span>
      </div>
      <div class="detail-lead-date">Lead seit: ${formatDate(c.leadDate)}${c.lastContactDate ? ' · Letzter Kontakt: ' + formatDate(c.lastContactDate) : ''}</div>
      <div class="detail-badges">
        <span class="badge" style="background:${si.color}18;color:${si.color};border-color:${si.color}44">${si.icon} ${si.label}</span>
        ${pri ? `<span class="badge" style="background:${pri.color}18;color:${pri.color};border-color:${pri.color}44">${pri.label}</span>` : ''}
        ${c.nextAction ? `<span class="badge" style="background:var(--accent-glow);color:var(--accent);border-color:var(--accent)">→ ${esc(c.nextAction)}</span>` : ''}
      </div>
    </div>
  `;

  // Panels
  html += `<div class="panel-grid">`;

  // Pipeline Stage
  html += `<div class="panel"><div class="panel-title">Pipeline-Stufe</div>`;
  for (const s of PIPELINE_STAGES) {
    const active = c.stage === s.id;
    html += `<button class="option-btn ${active ? 'active' : ''}"
      style="${active ? `color:${s.color};border-color:${s.color}66;background:${s.color}12` : ''}"
      onclick="updateSelected({stage:'${s.id}'})">${s.icon} ${s.label}</button>`;
  }
  html += `</div>`;

  // Priority + Next Action
  html += `<div class="panel">`;
  html += `<div class="panel-title">Priorität</div>`;
  for (const p of PRIORITY_LEVELS) {
    const active = c.priority === p.id;
    html += `<button class="option-btn ${active ? 'active' : ''}"
      style="${active ? `color:${p.color};border-color:${p.color}66;background:${p.color}12` : ''}"
      onclick="updateSelected({priority:'${p.id}'})">${p.label}</button>`;
  }
  html += `<div class="panel-title" style="margin-top:16px;">Nächste Aktion</div>`;
  for (const a of NEXT_ACTIONS) {
    const active = c.nextAction === a;
    html += `<button class="option-btn ${active ? 'active' : ''}"
      style="${active ? 'color:var(--accent);border-color:var(--accent);background:var(--accent-glow)' : ''}"
      onclick="updateSelected({nextAction:'${esc(a)}'})">${esc(a)}</button>`;
  }
  html += `
    <div style="margin-top:12px;">
      <label>Follow-Up Datum</label>
      <input type="date" value="${c.nextActionDate || ''}"
        onchange="updateSelected({nextActionDate:this.value})">
    </div>
  </div>`;

  html += `</div>`; // end panel-grid

  // Link & Funnel
  html += `
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-title">Link & Funnel</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label>Link gesendet am</label>
          <input type="date" value="${c.linkSentDate || ''}"
            onchange="updateSelected({linkSentDate:this.value})">
        </div>
        <div>
          <label>Funnel-Status</label>
          <select onchange="updateSelected({funnelStatus:this.value})">
            ${FUNNEL_STATUSES.map(f => `<option value="${f.value}" ${c.funnelStatus === f.value ? 'selected' : ''}>${f.label}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  `;

  // Notes
  html += `
    <div class="notes-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="panel-title" style="margin:0;">Gesprächsnotizen</div>
        <button class="btn btn-primary btn-sm" onclick="state.showNoteForm=true;render()">+ Notiz</button>
      </div>
  `;

  if (state.showNoteForm) {
    html += `
      <div style="margin-bottom:16px;">
        <textarea id="noteInput" placeholder="Was wurde besprochen? Einwände? Interesse? Nächste Schritte?">${esc(state.noteText)}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-green btn-sm" onclick="addNote()">Speichern</button>
          <button class="btn btn-ghost btn-sm" onclick="state.showNoteForm=false;state.noteText='';render()">Abbrechen</button>
        </div>
      </div>
    `;
  }

  const notes = [...(c.notes || [])].reverse();
  if (notes.length === 0) {
    html += `<div style="color:var(--text-muted);font-size:14px;font-style:italic;">Noch keine Notizen vorhanden.</div>`;
  }
  for (const n of notes) {
    html += `
      <div class="note-entry">
        <div class="note-date">${formatDate(n.date)}${n.type === 'import' ? ' · Import' : ''}</div>
        <div class="note-text">${esc(n.text)}</div>
      </div>
    `;
  }
  html += `</div>`; // end notes-section
  html += `</div>`; // end detail-view

  return html;
}

function connectApi() {
  const url = document.getElementById("apiUrlInput").value.trim();
  if (!url) return;
  state.apiUrl = url;
  localStorage.setItem("crm_api_url", url);
  render();
  loadContacts();
}

function disconnectApi() {
  if (confirm("API-Verbindung trennen? Du kannst eine neue URL eingeben.")) {
    state.apiUrl = "";
    state.contacts = [];
    localStorage.removeItem("crm_api_url");
    render();
  }
}

function toggleFilter(stageId) {
  state.filterStage = state.filterStage === stageId ? "all" : stageId;
  render();
}

function openContact(id) {
  state.selectedId = id;
  state.view = "detail";
  state.showNoteForm = false;
  state.noteText = "";
  render();
  window.scrollTo(0, 0);
}

function addContact() {
  const name = document.getElementById("newName").value.trim();
  const email = document.getElementById("newEmail").value.trim();
  const phone = document.getElementById("newPhone").value.trim();
  if (!name) { showToast("Name ist erforderlich", "error"); return; }
  createContact({ name, email, phone, nextAction: "", nextActionDate: "", linkSentDate: "", funnelStatus: "", lastContactDate: "" });
  state.showAddForm = false;
}

function addNote() {
  const textarea = document.getElementById("noteInput");
  const text = textarea ? textarea.value.trim() : "";
  if (!text) return;
  const c = getSelected();
  if (!c) return;
  const note = { id: genId(), text, date: new Date().toISOString().split("T")[0], type: "manual" };
  const updatedNotes = [...(c.notes || []), note];
  const today = new Date().toISOString().split("T")[0];
  updateSelected({ notes: updatedNotes, lastContactDate: today });
  state.showNoteForm = false;
  state.noteText = "";
}

function esc(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}
